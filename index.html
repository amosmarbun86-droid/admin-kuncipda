<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KunciPDA — Security Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
          --bg: #0A0D14;
          --bg-elevated: #10131C;
          --card: #141826;
          --card-hover: #171B2B;
          --border: #262B3D;
          --border-soft: #1D2130;
          --text: #EDEFF4;
          --text-muted: #8B92A6;
          --text-faint: #565D72;
          --accent: #C6A15B;
          --accent-dim: rgba(198, 161, 91, 0.14);
          --accent-text: #E4C888;
          --success: #3FA772;
          --success-dim: rgba(63, 167, 114, 0.14);
          --warning: #D68A3C;
          --warning-dim: rgba(214, 138, 60, 0.14);
          --danger: #C1443B;
          --danger-dim: rgba(193, 68, 59, 0.16);
          --font-display: 'Space Grotesk', sans-serif;
          --font-body: 'Inter', -apple-system, sans-serif;
          --font-mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
          margin: 0;
          font-family: var(--font-body);
          background:
            radial-gradient(1100px 500px at 15% -10%, rgba(198,161,91,0.06), transparent 60%),
            var(--bg);
          color: var(--text);
          padding: 24px 20px 60px;
          -webkit-font-smoothing: antialiased;
        }

        main { max-width: 820px; margin: 0 auto; }

        /* ===== Header ===== */
        header {
          display: flex;
          justify-content: space-between;
          align-items: flex-end;
          border-bottom: 1px solid var(--border);
          padding-bottom: 22px;
          margin-bottom: 28px;
        }
        .brand-eyebrow {
          font-family: var(--font-mono);
          font-size: 0.68rem;
          letter-spacing: 0.16em;
          color: var(--accent-text);
          text-transform: uppercase;
          margin-bottom: 6px;
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .brand-eyebrow::before {
          content: "";
          width: 6px; height: 6px;
          background: var(--success);
          border-radius: 50%;
          box-shadow: 0 0 8px var(--success);
        }
        header h1 {
          margin: 0;
          font-family: var(--font-display);
          font-weight: 700;
          font-size: 1.65rem;
          letter-spacing: -0.01em;
          color: var(--text);
        }
        .sub {
          font-family: var(--font-mono);
          font-size: 0.72rem;
          color: var(--text-faint);
          margin-top: 6px;
        }
        .logout-btn {
          background: transparent;
          border: 1px solid var(--border);
          color: var(--text-muted);
          border-radius: 6px;
          padding: 9px 14px;
          cursor: pointer;
          font-family: var(--font-mono);
          font-size: 0.72rem;
          letter-spacing: 0.04em;
          text-transform: uppercase;
          transition: border-color 0.15s, color 0.15s;
        }
        .logout-btn:hover { border-color: var(--accent); color: var(--accent-text); }

        /* ===== Section titles ===== */
        .section-title {
          font-family: var(--font-mono);
          font-size: 0.72rem;
          font-weight: 500;
          color: var(--text-faint);
          text-transform: uppercase;
          letter-spacing: 0.12em;
          margin: 34px 0 14px;
          padding-bottom: 8px;
          border-bottom: 1px solid var(--border-soft);
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .section-title::before {
          content: "";
          width: 3px; height: 12px;
          background: var(--accent);
        }

        /* ===== Request cards ===== */
        .request-card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 18px;
          margin-bottom: 10px;
        }
        .request-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .request-name { font-family: var(--font-display); font-weight: 600; font-size: 1.05rem; color: var(--text); }
        .request-meta { font-family: var(--font-mono); font-size: 0.76rem; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6; }
        .request-actions { display: flex; gap: 10px; }
        .request-actions button {
          flex: 1; padding: 10px; border: none; border-radius: 7px;
          font-family: var(--font-body); font-weight: 600; font-size: 0.85rem; cursor: pointer;
          transition: opacity 0.15s, transform 0.1s;
        }
        .request-actions button:active { transform: scale(0.98); }
        .btn-approve { background: var(--success); color: #071A10; }
        .btn-reject { background: transparent; color: var(--danger); border: 1px solid rgba(193,68,59,0.4) !important; }

        /* ===== Device cards ===== */
        .device-card {
          background: var(--card);
          border: 1px solid var(--border);
          border-left: 3px solid var(--text-faint);
          border-radius: 10px;
          padding: 18px;
          margin-bottom: 12px;
          transition: border-color 0.15s;
        }
        .device-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .device-id { font-family: var(--font-mono); font-weight: 600; font-size: 1rem; color: var(--text); letter-spacing: 0.01em; }

        .badge {
          padding: 4px 10px; border-radius: 4px;
          font-family: var(--font-mono); font-size: 0.68rem; font-weight: 600;
          letter-spacing: 0.06em; text-transform: uppercase;
          border: 1px solid transparent;
        }
        .badge.available { background: var(--success-dim); color: var(--success); border-color: rgba(63,167,114,0.3); }
        .badge.inuse { background: var(--warning-dim); color: var(--warning); border-color: rgba(214,138,60,0.3); }
        .badge.locked { background: var(--danger-dim); color: var(--danger); border-color: rgba(193,68,59,0.3); }

        .device-card:has(.badge.inuse) { border-left-color: var(--warning); }
        .device-card:has(.badge.locked) { border-left-color: var(--danger); }
        .device-card:has(.badge.available) { border-left-color: var(--success); }

        .row {
          display: flex; justify-content: space-between;
          font-family: var(--font-mono); font-size: 0.78rem;
          margin-top: 6px; color: var(--text-muted);
          padding: 3px 0;
        }
        .row b { color: var(--text); font-weight: 500; }

        .holder-banner {
          margin-top: 12px; padding: 11px 12px;
          background: var(--accent-dim);
          border-radius: 7px; font-size: 0.82rem; color: var(--accent-text);
          border: 1px solid rgba(198,161,91,0.25);
        }
        .actions { display: flex; gap: 8px; margin-top: 16px; }
        .actions button {
          flex: 1; padding: 10px; border-radius: 7px;
          font-family: var(--font-body); font-weight: 600; cursor: pointer; font-size: 0.8rem;
          border: 1px solid transparent;
          transition: opacity 0.15s, transform 0.1s;
        }
        .actions button:active { transform: scale(0.97); }

        .toast {
          position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
          background: var(--bg-elevated); border: 1px solid var(--border);
          padding: 12px 22px; border-radius: 8px; opacity: 0; transition: opacity 0.3s;
          font-size: 0.85rem; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .toast.show { opacity: 1; }
        .empty {
          color: var(--text-faint); font-style: italic; padding: 16px;
          font-size: 0.85rem; text-align: center;
          border: 1px dashed var(--border); border-radius: 8px;
        }

        /* Riwayat Penggunaan */
        .history-card {
          background: var(--card); border: 1px solid var(--border); border-radius: 10px;
          padding: 16px 18px; margin-bottom: 10px; cursor: pointer; user-select: none;
        }
        .history-head { display: flex; justify-content: space-between; align-items: center; }
        .history-head .device-id { font-size: 0.88rem; }
        .history-body { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
        .history-entry {
          display: flex; justify-content: space-between; font-family: var(--font-mono);
          font-size: 0.76rem; color: var(--text-muted); border-top: 1px solid var(--border-soft); padding-top: 8px;
        }
        .history-entry:first-child { border-top: none; padding-top: 0; }

        /* Peta Lokasi Device */
        #map { height: 320px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; z-index: 0; filter: saturate(0.35) brightness(0.9); }
        .map-hint { font-family: var(--font-mono); font-size: 0.76rem; color: var(--text-faint); margin-bottom: 12px; }

        /* Login screen */
        #login-screen { font-family: var(--font-body); }
        .login-panel {
          width: 100%; max-width: 340px;
          background: var(--card);
          border: 1px solid var(--border);
          border-top: 2px solid var(--accent);
          border-radius: 12px;
          padding: 32px 28px;
        }
        .login-eyebrow {
          font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.16em;
          color: var(--accent-text); text-transform: uppercase; margin-bottom: 10px;
        }
        .login-title {
          font-family: var(--font-display); font-weight: 700; font-size: 1.4rem;
          color: var(--text); margin: 0 0 24px;
        }
        .login-input {
          width: 100%; padding: 12px 14px; border-radius: 7px;
          border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text);
          font-family: var(--font-body); font-size: 0.9rem;
          margin-bottom: 10px;
        }
        .login-input:focus { outline: none; border-color: var(--accent); }
        .login-btn {
          width: 100%; padding: 12px; border-radius: 7px; border: none;
          background: var(--accent); color: #1A1204; font-weight: 600; font-size: 0.88rem;
          cursor: pointer; font-family: var(--font-body); margin-top: 4px;
          transition: opacity 0.15s;
        }
        .login-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="login-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; padding:20px;">
  <div class="login-panel">
    <div class="login-eyebrow">Akses Terbatas</div>
    <h2 class="login-title">KunciPDA Console</h2>
    <input id="login-email" type="email" placeholder="Email" class="login-input">
    <input id="login-password" type="password" placeholder="Kata sandi" class="login-input">
    <button onclick="doLogin()" class="login-btn">Masuk</button>
    <div id="login-error" style="color:#C1443B; font-size:0.8rem; margin-top:10px; font-family:'IBM Plex Mono',monospace;"></div>
  </div>
</div>

<div id="app-content" style="display:none;">
<main>
    <header>
      <div>
        <div class="brand-eyebrow">Security Console</div>
        <h1>KunciPDA Admin</h1>
        <div class="sub" id="last-update">Menghubungkan ke database...</div>
      </div>
      <div style="display:flex; gap:8px;">
        <button onclick="exportPDF()" class="logout-btn" style="border-color:var(--accent); color:var(--accent-text);">Unduh Laporan PDF</button>
        <button onclick="doLogout()" class="logout-btn">Keluar</button>
      </div>
    </header>

    <div class="section-title">Menunggu Persetujuan</div>
    <div id="request-list"></div>

    <div class="section-title">Device Aktif — In Use</div>
    <div id="flagged-list"></div>

    <div class="section-title">Semua Device</div>
    <div id="device-list"></div>

    <div class="section-title">Peta Lokasi Device</div>
    <div id="map"></div>
    <div class="map-hint" id="map-hint"></div>

    <div class="section-title">Daftar Staff</div>
    <div id="user-list"></div>

    <div class="section-title">Riwayat Penggunaan</div>
    <div id="history-list"></div>

    <div class="section-title">Peringatan Keamanan</div>
    <div id="security-alerts-list"></div>
</main>

<div class="toast" id="toast"></div>

<div id="lock-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; padding:20px;">
  <div style="background:var(--card); border:1px solid var(--border); border-top:2px solid var(--accent); border-radius:12px; padding:24px; width:100%; max-width:400px;">
    <div style="font-family:'IBM Plex Mono',monospace; font-size:0.68rem; letter-spacing:0.12em; color:var(--accent-text); text-transform:uppercase; margin-bottom:8px;">Kunci Device</div>
    <div style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.1rem; margin-bottom:16px;">Kirim pesan peringatan?</div>

    <select id="lock-template-select" onchange="onLockTemplateChange()" style="width:100%; padding:10px; border-radius:7px; border:1px solid var(--border); background:var(--bg-elevated); color:var(--text); font-family:'Inter',sans-serif; font-size:0.85rem; margin-bottom:10px;">
      <option value="">Tanpa pesan (kunci biasa)</option>
      <option value="Device ini terkunci karena belum dikembalikan sesuai jadwal.">Belum dikembalikan sesuai jadwal</option>
      <option value="Segera hubungi admin untuk konfirmasi penggunaan device ini.">Hubungi admin untuk konfirmasi</option>
      <option value="Device dikunci sementara untuk pemeliharaan.">Pemeliharaan sementara</option>
      <option value="Penggunaan device ini mencurigakan, dikunci untuk verifikasi.">Aktivitas mencurigakan</option>
      <option value="__custom__">Tulis pesan sendiri...</option>
    </select>

    <textarea id="lock-custom-message" placeholder="Tulis pesan peringatan..." style="display:none; width:100%; min-height:80px; padding:10px; border-radius:7px; border:1px solid var(--border); background:var(--bg-elevated); color:var(--text); font-family:'Inter',sans-serif; font-size:0.85rem; margin-bottom:10px; resize:vertical;"></textarea>

    <div style="display:flex; gap:10px; margin-top:8px;">
      <button onclick="closeLockDialog()" style="flex:1; padding:11px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; font-weight:600;">Batal</button>
      <button onclick="confirmLock()" style="flex:1; padding:11px; border-radius:7px; border:none; background:var(--danger); color:white; cursor:pointer; font-weight:600;">Kunci Device</button>
    </div>
  </div>
</div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
// --- LOGIKA ANDA (DIPERTAHANKAN 100%) ---
const DATABASE_URL = "https://kuncipda-default-rtdb.asia-southeast1.firebasedatabase.app";
const REFRESH_MS = 5000;

// ===== AUTENTIKASI ADMIN =====
const FIREBASE_API_KEY = "AIzaSyCB4GOEL2OqHERDwTOpjYOvcby1o2ZqJHg";
const AUTH_SIGNIN_URL = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FIREBASE_API_KEY}`;
const AUTH_REFRESH_URL = `https://securetoken.googleapis.com/v1/token?key=${FIREBASE_API_KEY}`;
const SESSION_KEY = 'kuncipda_session';

let idToken = null;
let refreshTokenValue = null;
let tokenExpiry = 0;
let refreshTimer = null;

function saveSession(data) {
  idToken = data.idToken || data.id_token;
  refreshTokenValue = data.refreshToken || data.refresh_token;
  const expiresIn = Number(data.expiresIn || data.expires_in || 3600);
  tokenExpiry = Date.now() + expiresIn * 1000;
  localStorage.setItem(SESSION_KEY, JSON.stringify({ idToken, refreshTokenValue, tokenExpiry }));
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.idToken || !data.refreshTokenValue) return false;
    idToken = data.idToken;
    refreshTokenValue = data.refreshTokenValue;
    tokenExpiry = data.tokenExpiry || 0;
    return true;
  } catch (e) { return false; }
}

function clearSession() {
  idToken = null; refreshTokenValue = null; tokenExpiry = 0;
  localStorage.removeItem(SESSION_KEY);
}

async function refreshIdToken() {
  const res = await fetch(AUTH_REFRESH_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=refresh_token&refresh_token=${encodeURIComponent(refreshTokenValue)}`
  });
  if (!res.ok) throw new Error('Sesi login berakhir, silakan login lagi');
  const data = await res.json();
  saveSession(data);
}

async function ensureValidToken() {
  if (!idToken) throw new Error('Belum login');
  if (Date.now() > tokenExpiry - 60000) {
    await refreshIdToken();
  }
}

// Pengganti fetch(`${DATABASE_URL}...`) biasa - otomatis menyisipkan token login
// yang valid, dan otomatis refresh token kalau sudah mau kedaluwarsa.
async function authFetch(path, options = {}) {
  await ensureValidToken();
  const sep = path.includes('?') ? '&' : '?';
  return fetch(`${DATABASE_URL}${path}${sep}auth=${idToken}`, options);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const res = await fetch(AUTH_SIGNIN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, returnSecureToken: true })
    });
    const data = await res.json();
    if (!res.ok) {
      const msg = (data.error && data.error.message) || 'Login gagal';
      throw new Error(msg);
    }
    saveSession(data);
    showApp();
  } catch (err) {
    errEl.textContent = 'Login gagal: ' + err.message;
  }
}

function doLogout() {
  clearSession();
  if (refreshTimer) clearInterval(refreshTimer);
  document.getElementById('app-content').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
  initMap();
  fetchAll();
  refreshTimer = setInterval(fetchAll, REFRESH_MS);
}
// ===== AKHIR AUTENTIKASI =====

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function statusBadgeClass(status) {
  if (!status) return 'available';
  const s = status.toLowerCase();
  if (s.includes('use')) return 'inuse';
  if (s.includes('lock')) return 'locked';
  if (s.includes('lost')) return 'locked';
  return 'available';
}

function fmtTime(ts) {
  if (!ts || ts === 0) return '-';
  const d = new Date(Number(ts));
  if (isNaN(d.getTime()) || d.getFullYear() < 2000) return '-';
  return d.toLocaleString('id-ID');
}

async function sendCommand(deviceId, action, lockMessage) {
  try {
    const body = { command: action };
    if (action === 'LOCK') {
      body.lock_message = lockMessage || '';
    }
    await authFetch(`/devices/${deviceId}/status.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    showToast(`Perintah "${action}" terkirim ke ${deviceId}`);
    fetchAll();
  } catch (err) { showToast('Gagal: ' + err.message); }
}

let lockTargetDevice = null;

function openLockDialog(id) {
  lockTargetDevice = id;
  document.getElementById('lock-template-select').value = '';
  document.getElementById('lock-custom-message').style.display = 'none';
  document.getElementById('lock-custom-message').value = '';
  document.getElementById('lock-modal').style.display = 'flex';
}

function closeLockDialog() {
  document.getElementById('lock-modal').style.display = 'none';
  lockTargetDevice = null;
}

function onLockTemplateChange() {
  const select = document.getElementById('lock-template-select');
  const customBox = document.getElementById('lock-custom-message');
  customBox.style.display = select.value === '__custom__' ? 'block' : 'none';
}

function confirmLock() {
  if (!lockTargetDevice) return;
  const select = document.getElementById('lock-template-select');
  let message = '';
  if (select.value === '__custom__') {
    message = document.getElementById('lock-custom-message').value.trim();
  } else {
    message = select.value;
  }
  sendCommand(lockTargetDevice, 'LOCK', message);
  closeLockDialog();
}

async function forceCheckin(deviceId){

  try{

    await authFetch(`/devices/${deviceId}/status.json`,{

      method:"PATCH",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        current_status:"AVAILABLE",

        current_user:"",

        employeeId:"",

        // Perintah jarak jauh: begitu HP menerima ini, dia otomatis kembali
        // ke layar login sendiri (mirip mekanisme LOCK/UNLOCK)
        command:"CHECKIN"

      })

    });

    const userRes=await authFetch(`/users.json`);

    const users=await userRes.json();

    for(const empId in users){

      if(users[empId].active_device===deviceId){

        await authFetch(`/users/${empId}.json`,{

          method:"PATCH",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({

            active_device:"",

            status:"IDLE"

          })

        });

        // Catat riwayat: device ini dikembalikan oleh staff yang bersangkutan
        await authFetch(`/logs/${deviceId}.json`, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({
            event: "CHECKIN",
            user: `${users[empId].name || 'Staff'} (${empId})`,
            timestamp: Date.now()
          })
        });

        // TIDAK ada "break" di sini lagi - sengaja, supaya SEMUA staff yang
        // (secara data) tercatat masih pegang device ini ikut direset semua,
        // bukan cuma yang pertama ditemukan.

      }

    }

    showToast("Device berhasil dikembalikan");

    fetchAll();

  }catch(e){

    showToast(e.message);

  }

}

function renderDevices(devices) {
  const ids = Object.keys(devices || {});
  const flaggedDiv = document.getElementById('flagged-list');
  const listDiv = document.getElementById('device-list');
  const flagged = []; const normal = [];

  ids.forEach(id => {
    const d = devices[id] || {};
    const status = d.status || {};
    const isInUse = (status.current_status || '').toUpperCase() === 'IN_USE';
    const isLocked = status.locked === true;
    const pendingCmd = status.command && status.command !== 'NONE';
    const nickname = (d.info || {}).nickname;

    const loc = d.location || {};
    const lat = parseCoord(loc.lat);
    const lng = parseCoord(loc.lng);
    const hasLocation = lat !== null && lng !== null && !(lat === 0 && lng === 0);
    const mapThumb = hasLocation ? `
      <a href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=17/${lat}/${lng}" target="_blank" rel="noopener">
        <img src="https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lng}&zoom=15&size=400x140&markers=${lat},${lng},red-pushpin"
             alt="Lokasi device" style="width:100%; border-radius:8px; margin-top:8px; display:block;">
      </a>
    ` : `<div style="font-size:0.75rem; color:var(--text-faint); margin-top:8px;">📍 Lokasi belum tersedia</div>`;

    const cardHtml = (flaggedStyle) => `
      <div class="device-card">
        <div class="device-top">
          <div>
            <div class="device-id">${nickname ? nickname : id}</div>
            ${nickname ? `<div style="font-size:0.7rem; color:var(--text-faint);">${id}</div>` : ''}
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="badge ${statusBadgeClass(status.current_status)}">${status.current_status || 'UNKNOWN'}</span>
            ${isLocked ? `<span class="badge locked">🔒 TERKUNCI</span>` : ''}
            <button style="background:none; border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:4px 8px; font-size:0.75rem; cursor:pointer;" onclick="setNickname('${id}')">✏️</button>
          </div>
        </div>
        <div class="row"><span>Asset</span><b>${(d.info || {}).asset_tag || '-'}</b></div>
        <div class="row"><span>Battery</span><b>${status.battery_level != null ? status.battery_level + '%' : '-'}</b></div>
        <div class="row">
    <span>Online</span>
    <b>${
        (() => {
            const last = Number(status.last_seen || 0);
            const diff = Date.now() - last;

            if (last === 0) {
                return "⚫ UNKNOWN";
            }

            if (diff < 60000) {
                return "🟢 ONLINE";
            }

            return "🔴 OFFLINE";
        })()
    }</b>
</div>
      <div class="row">
    <span>Last Seen</span>
    <b>${fmtTime(status.last_seen)}</b>
</div>
        ${mapThumb}
        ${isInUse ? `<div class="holder-banner">📌 Dipakai: <b>${status.current_user || 'Unknown'}</b>${status.employeeId ? ` <span style="color:var(--text-muted); font-weight:400;">(${status.employeeId})</span>` : ''}</div>` : ''}
        ${isLocked && status.lock_message ? `<div style="margin-top:8px; padding:10px 12px; background:var(--danger-dim); border:1px solid rgba(193,68,59,0.3); border-radius:7px; font-size:0.8rem; color:#F0A8A2;">📨 ${status.lock_message}</div>` : ''}
        ${pendingCmd ? `<div style="font-size:0.7rem; color:var(--warning); margin-top:5px;">⏳ Waiting: ${status.command}</div>` : ''}
        <div class="actions">
          <button style="background:transparent; border:1px solid rgba(193,68,59,0.45); color:var(--danger);" onclick="openLockDialog('${id}')">Lock</button>
          <button style="background:var(--success); color:#071A10;" onclick="sendCommand('${id}','UNLOCK')">Unlock</button>
          ${isInUse ? `<button style="background:transparent; border:1px solid rgba(198,161,91,0.45); color:var(--accent-text);" onclick="forceCheckin('${id}')">Check-in</button>` : ''}
        </div>
        <div class="actions" style="margin-top:8px;">
          <button style="background:transparent; border:1px solid rgba(214,138,60,0.45); color:var(--warning);" onclick="sendCommand('${id}','ALARM')">🔊 Bunyikan Alarm</button>
          <button style="background:transparent; border:1px solid var(--border); color:var(--text-muted);" onclick="sendCommand('${id}','STOP_ALARM')">Hentikan Alarm</button>
        </div>
      </div>
    `;
    if (isInUse) flagged.push(cardHtml(true));
    else normal.push(cardHtml(false));
  });

  flaggedDiv.innerHTML = flagged.length ? flagged.join('') : '<div class="empty">Tidak ada device dipakai.</div>';
  listDiv.innerHTML = normal.join('');
}

  try {

      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: name })
    });

const expandedHistory = new Set();

function toggleHistory(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.style.display !== 'none';

  } else {

}

let map;
let markersLayer;

function initMap() {
  // Default view: tengah Indonesia, di-zoom out dulu sebelum tahu lokasi device
  map = L.map('map').setView([-2.5, 118], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

// App Android menyimpan lat/lng sebagai teks dengan KOMA sebagai desimal
// (mis. "-6,914744"), bukan titik - jadi perlu dikonversi dulu sebelum di-parse.
function parseCoord(val) {
  if (val === undefined || val === null || val === '') return null;
  const num = parseFloat(String(val).replace(',', '.'));
  return isNaN(num) ? null : num;
}

function renderMap(devices) {
  if (!map) return;
  markersLayer.clearLayers();

  const ids = Object.keys(devices || {});
  const points = [];

  ids.forEach(id => {
    const dev = devices[id] || {};
    const loc = dev.location || {};
    const lat = parseCoord(loc.lat);
    const lng = parseCoord(loc.lng);

    // Lewati kalau belum ada data lokasi, atau masih 0,0 (GPS belum dapat fix pertama)
    if (lat === null || lng === null || (lat === 0 && lng === 0)) return;

    const status = (dev.status || {}).current_status || 'UNKNOWN';
    const holder = (dev.status || {}).current_user;
    const nickname = (dev.info || {}).nickname;
    const label = nickname ? `${nickname} <span style="color:#888;">(${id})</span>` : id;

    const marker = L.marker([lat, lng]).bindPopup(
      `<b>${label}</b><br>${status}${holder ? ' · ' + holder : ''}`
    );
    markersLayer.addLayer(marker);
    points.push([lat, lng]);
  });

  const hint = document.getElementById('map-hint');
  if (points.length) {
    map.fitBounds(points, { maxZoom: 16, padding: [30, 30] });
    hint.textContent = '';
  } else {
    hint.textContent = 'Belum ada device dengan lokasi valid (GPS mungkin belum aktif/belum dapat sinyal).';
  }
}

async function approveRequest(reqId, empId, name, devId) {

  try {

    // Set status "approved" dulu - INI WAJIB ADA supaya app Android (MainActivity)
    // yang sedang menunggu event ini bisa pindah ke halaman Home. Kalau langkah ini
    // dilewati, app di HP staff akan macet di spinner "Mengirim permintaan..." selamanya.
    await authFetch(`/requests/${reqId}.json`, {
      method: "PATCH",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ status: "approved" })
    });

    // Cek dulu apakah device ini sebelumnya masih tercatat dipegang staff LAIN
    // (yang belum sempat checkout). Kalau ada, reset staff lama itu ke IDLE dulu -
    // supaya tidak ada 2 staff sekaligus tercatat ACTIVE pegang device yang sama.
    const prevStatusRes = await authFetch(`/devices/${devId}/status.json`);
    const prevStatus = await prevStatusRes.json();
    const prevEmpId = prevStatus && prevStatus.employeeId;
    if (prevEmpId && prevEmpId !== empId) {
      await authFetch(`/users/${prevEmpId}.json`, {
        method: "PATCH",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ active_device: "", status: "IDLE" })
      });
    }

    // Update user
    await authFetch(`/users/${empId}.json`, {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        active_device: devId,
        status: "ACTIVE",
        name: name
      })
    });

    // Update device
    await authFetch(`/devices/${devId}/status.json`, {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        current_status:"IN_USE",
        current_user:name,
        employeeId:empId,
        last_seen:Date.now()
      })
    });

    // Hapus request TIDAK dilakukan di sini lagi. App Android (MainActivity) sudah
    // otomatis menghapus request ini sendiri (firebaseRequest.removeValue()) begitu
    // dia berhasil memproses status "approved". Kalau dashboard ikut menghapus di sini,
    // ada resiko request hilang SEBELUM app sempat menerima event "approved" (terutama
    // kalau koneksi HP staff sedang tidak stabil) - staff jadi macet di spinner login
    // selamanya. Membiarkan app yang hapus sendiri menjamin urutan selalu benar.

    // Catat riwayat: device ini mulai dipakai staff yang bersangkutan
    await authFetch(`/logs/${devId}.json`, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({
        event: "CHECKOUT",
        user: `${name} (${empId})`,
        timestamp: Date.now()
      })
    });

    showToast("✅ Login disetujui");

    fetchAll();

  } catch(e){

    showToast(e.message);

  }

}

async function rejectRequest(reqId, name) {
  try {
    // PATCH status "rejected" dulu supaya app di HP staff (yang sedang menunggu event
    // ini) bisa menampilkan teks "Ditolak oleh admin". Baru setelah dikasih jeda
    // beberapa detik (supaya app pasti sempat menerima event ini), request dihapus.
    await authFetch(`/requests/${reqId}.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'rejected' })
    });
    showToast(`❌ Ditolak: ${name}`);
    fetchAll();

    setTimeout(() => {
      authFetch(`/requests/${reqId}.json`, { method: 'DELETE' }).catch(() => {});
    }, 4000);
  } catch (err) { showToast('Gagal: ' + err.message); }
}

function renderRequests(requests) {
  const div = document.getElementById('request-list');
  const ids = Object.keys(requests || {});
  const pending = ids.filter(id => (requests[id] || {}).status === 'pending');

  div.innerHTML = pending.length ? pending.map(reqId => {
    const r = requests[reqId];
    const ts = Number(r.requested_at);
    const ageMinutes = ts ? (Date.now() - ts) / 60000 : null;
    const isStale = ageMinutes !== null && ageMinutes > 15; // lebih dari 15 menit dianggap kemungkinan basi
    const timeLabel = ts ? fmtTime(r.requested_at) : '-';

    return `
      <div class="request-card">
        <div class="request-name">${r.name || 'Staff'}</div>
        <div class="request-meta">
          ID: ${r.employeeId} · Device: ${r.deviceId}<br>
          Diminta: ${timeLabel}
          ${isStale ? ' <span style="color:var(--warning); font-weight:600;">⚠️ Sudah lama, kemungkinan basi</span>' : ''}
        </div>
        <div class="request-actions">
          <button class="btn-approve" onclick="approveRequest('${reqId}','${r.employeeId}','${r.name}','${r.deviceId}')">Setujui</button>
          <button class="btn-reject" onclick="rejectRequest('${reqId}','${r.name}')">Tolak</button>
        </div>
      </div>
    `;
  }).join('') : '<div class="empty">Tidak ada permintaan login.</div>';
}

function exportPDF() {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const now = new Date();
    const generatedAt = now.toLocaleString('id-ID');

    // ===== Header =====
    doc.setFontSize(18);
    doc.setFont(undefined, 'bold');
    doc.text('KunciPDA — Laporan Operasional', 14, 18);
    doc.setFontSize(9);
    doc.setFont(undefined, 'normal');
    doc.setTextColor(120);
    doc.text(`Dibuat: ${generatedAt}`, 14, 24);
    doc.setTextColor(0);

    const deviceIds = Object.keys(lastDevices || {});
    const totalDevices = deviceIds.length;
    const inUseCount = deviceIds.filter(id => ((lastDevices[id].status || {}).current_status || '').toUpperCase() === 'IN_USE').length;
    const availableCount = deviceIds.filter(id => ((lastDevices[id].status || {}).current_status || '').toUpperCase() === 'AVAILABLE').length;
    const lockedCount = deviceIds.filter(id => (lastDevices[id].status || {}).locked === true).length;

    // ===== Ringkasan =====
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('Ringkasan', 14, 34);
    doc.autoTable({
      startY: 38,
      head: [['Total Device', 'Sedang Dipakai', 'Tersedia', 'Sedang Terkunci']],
      body: [[String(totalDevices), String(inUseCount), String(availableCount), String(lockedCount)]],
      theme: 'grid',
      headStyles: { fillColor: [30, 34, 48] },
      styles: { fontSize: 9 }
    });

    // ===== Tabel Device =====
    let y = doc.lastAutoTable.finalY + 12;
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('Daftar Device', 14, y);
    const deviceRows = deviceIds.map(id => {
      const d = lastDevices[id] || {};
      const status = d.status || {};
      const nickname = (d.info || {}).nickname || '-';
      return [
        nickname,
        id,
        status.current_status || 'UNKNOWN',
        status.locked ? 'Ya' : 'Tidak',
        status.battery_level != null ? `${status.battery_level}%` : '-',
        status.current_user || '-'
      ];
    });
    doc.autoTable({
      startY: y + 4,
      head: [['Nama', 'ID Device', 'Status', 'Terkunci', 'Baterai', 'Dipakai Oleh']],
      body: deviceRows.length ? deviceRows : [['-', '-', '-', '-', '-', '-']],
      theme: 'striped',
      headStyles: { fillColor: [30, 34, 48] },
      styles: { fontSize: 8 }
    });

    // ===== Tabel Staff =====
    y = doc.lastAutoTable.finalY + 12;
    if (y > 250) { doc.addPage(); y = 20; }
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('Daftar Staff', 14, y);
    const userIds = Object.keys(lastUsers || {});
    const userRows = userIds.map(id => {
      const u = lastUsers[id] || {};
      return [u.name || '-', id, u.role || '-', u.status || 'IDLE', u.active_device || '-'];
    });
    doc.autoTable({
      startY: y + 4,
      head: [['Nama', 'ID Karyawan', 'Role', 'Status', 'Device Dipegang']],
      body: userRows.length ? userRows : [['-', '-', '-', '-', '-']],
      theme: 'striped',
      headStyles: { fillColor: [30, 34, 48] },
      styles: { fontSize: 8 }
    });

    // ===== Tabel Riwayat =====
    y = doc.lastAutoTable.finalY + 12;
    if (y > 240) { doc.addPage(); y = 20; }
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('Riwayat Penggunaan', 14, y);

    const historyRows = [];
    Object.keys(lastLogs || {}).forEach(devId => {
      const entries = lastLogs[devId] || {};
      Object.keys(entries).forEach(logId => {
        const l = entries[logId] || {};
        historyRows.push({
          ts: Number(l.timestamp) || 0,
          row: [devId, l.event || '-', l.user || '-', l.timestamp ? new Date(Number(l.timestamp)).toLocaleString('id-ID') : '-']
        });
      });
    });
    historyRows.sort((a, b) => b.ts - a.ts);
    const sortedRows = historyRows.slice(0, 100).map(r => r.row); // batasi 100 entri terbaru biar file tidak kegemukan

    doc.autoTable({
      startY: y + 4,
      head: [['Device', 'Event', 'Staff', 'Waktu']],
      body: sortedRows.length ? sortedRows : [['-', '-', '-', '-']],
      theme: 'striped',
      headStyles: { fillColor: [30, 34, 48] },
      styles: { fontSize: 8 }
    });

    const fileDate = now.toISOString().slice(0, 10);
    doc.save(`KunciPDA-Laporan-${fileDate}.pdf`);
    showToast('Laporan PDF berhasil dibuat');
  } catch (err) {
    console.error(err);
    showToast('Gagal membuat PDF: ' + err.message);
  }
}


async function fetchAll() {
  try {
    const [devRes, userRes, reqRes, logRes] = await Promise.all([
      authFetch(`/devices.json`),
      authFetch(`/users.json`),
      authFetch(`/requests.json`),
      authFetch(`/logs.json`)
    ]);

    // Kalau Firebase menolak (mis. permission denied), jangan anggap responsnya
    // sebagai data asli - pakai objek kosong sebagai gantinya supaya tidak salah tampil.
    const safeJson = async (res) => {
      if (!res.ok) return {};
      const data = await res.json();
      return (data && typeof data === 'object') ? data : {};
    };

    const devices = await safeJson(devRes);
    lastDevices = devices || {};
    const users = await safeJson(userRes);
    lastUsers = users || {};
    const logs = await safeJson(logRes);
    lastLogs = logs || {};
    renderRequests(await safeJson(reqRes));
    renderDevices(devices);
    renderMap(devices);
    renderUsers(users, devices);
    renderHistory(logs);
    renderSecurityAlerts(devices);
    document.getElementById('last-update').textContent = 'Update: ' + new Date().toLocaleTimeString();
  } catch (err) { console.error(err); }
}

// Kalau tidak, tampilkan halaman login dulu.
if (loadSession()) {
  showApp();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
