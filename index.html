<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KunciPDA — Admin Panel</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        
        /* Modern Container */
        main { max-width: 800px; margin: 0 auto; }
        
        /* Header */
        header { border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 1.5rem; color: #fff; }
        .sub { font-size: 0.85rem; color: #94a3b8; }

        /* Existing Styles (Kept for Logic) */
        .section-title { font-size: 0.9rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin: 20px 0 10px; }
        .request-card { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .request-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .request-name { font-weight: 700; font-size: 1.1rem; }
        .request-meta { font-size: 0.8rem; color: #94a3b8; margin-bottom: 12px; }
        .request-actions { display: flex; gap: 10px; }
        .request-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-approve { background: #059669; color: white; }
        .btn-reject { background: #be123c; color: white; }
        
        .device-card { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .device-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .device-id { font-weight: 800; font-size: 1.1rem; color: var(--accent); }
        .badge { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .badge.available { background: #065f46; color: #a7f3d0; }
        .badge.inuse { background: #92400e; color: #fef3c7; }
        .badge.locked { background: #991b1b; color: #fee2e2; }
        
        .row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 4px; color: #cbd5e1; }
        .holder-banner { margin-top: 10px; padding: 10px; background: #0f172a; border-radius: 8px; font-size: 0.85rem; color: #fbbf24; border: 1px solid #334155; }
        .actions { display: flex; gap: 8px; margin-top: 15px; }
        .actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #475569; padding: 12px 24px; border-radius: 999px; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        .empty { color: #475569; font-style: italic; padding: 10px; }
    </style>
</head>
<body>

<main>
    <header>
        <h1>🔐 KunciPDA Admin</h1>
        <div class="sub" id="last-update">Menghubungkan ke database...</div>
    </header>

    <div class="section-title">⏳ Menunggu Persetujuan</div>
    <div id="request-list"></div>

    <div class="section-title">Device Aktif (In Use)</div>
    <div id="flagged-list"></div>

    <div class="section-title">Semua Device</div>
    <div id="device-list"></div>

    <div class="section-title">Daftar Staff</div>
    <div id="user-list"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// --- LOGIKA ANDA (DIPERTAHANKAN 100%) ---
const DATABASE_URL = "https://kuncipda-default-rtdb.asia-southeast1.firebasedatabase.app";
const REFRESH_MS = 5000;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function statusBadgeClass(status) {
  if (!status) return 'available';
  const s = status.toLowerCase();
  if (s.includes('use')) return 'inuse';
  if (s.includes('lock')) return 'locked';
  if (s.includes('lost')) return 'locked';
  return 'available';
}

function fmtTime(ts) {
  if (!ts || ts === 0) return '-';
  const d = new Date(Number(ts));
  if (isNaN(d.getTime()) || d.getFullYear() < 2000) return '-';
  return d.toLocaleString('id-ID');
}

async function sendCommand(deviceId, action) {
  try {
    await fetch(`${DATABASE_URL}/devices/${deviceId}/status.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: action })
    });
    showToast(`Perintah "${action}" terkirim ke ${deviceId}`);
    fetchAll();
  } catch (err) { showToast('Gagal: ' + err.message); }
}

async function forceCheckin(deviceId){

  try{

    await fetch(`${DATABASE_URL}/devices/${deviceId}/status.json`,{

      method:"PATCH",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        current_status:"AVAILABLE",

        current_user:"",

        employeeId:""

      })

    });

    const userRes=await fetch(`${DATABASE_URL}/users.json`);

    const users=await userRes.json();

    for(const empId in users){

      if(users[empId].active_device===deviceId){

        await fetch(`${DATABASE_URL}/users/${empId}.json`,{

          method:"PATCH",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({

            active_device:"",

            status:"IDLE"

          })

        });

        break;

      }

    }

    showToast("Device berhasil dikembalikan");

    fetchAll();

  }catch(e){

    showToast(e.message);

  }

}

function renderDevices(devices) {
  const ids = Object.keys(devices || {});
  const flaggedDiv = document.getElementById('flagged-list');
  const listDiv = document.getElementById('device-list');
  const flagged = []; const normal = [];

  ids.forEach(id => {
    const d = devices[id] || {};
    const status = d.status || {};
    const isInUse = (status.current_status || '').toUpperCase() === 'IN_USE';
    const pendingCmd = status.command && status.command !== 'NONE';

    const cardHtml = (flaggedStyle) => `
      <div class="device-card">
        <div class="device-top">
          <div class="device-id">${id}</div>
          <span class="badge ${statusBadgeClass(status.current_status)}">${status.current_status || 'UNKNOWN'}</span>
        </div>
        <div class="row"><span>Asset</span><b>${(d.info || {}).asset_tag || '-'}</b></div>
        <div class="row"><span>Battery</span><b>${status.battery_level != null ? status.battery_level + '%' : '-'}</b></div>
        ${isInUse ? `<div class="holder-banner">📌 Dipakai: <b>${status.current_user || 'Unknown'}</b></div>` : ''}
        ${pendingCmd ? `<div style="font-size:0.7rem; color:#f59e0b; margin-top:5px;">⏳ Waiting: ${status.command}</div>` : ''}
        <div class="actions">
          <button style="background:#991b1b; color:white;" onclick="sendCommand('${id}','LOCK')">Lock</button>
          <button style="background:#065f46; color:white;" onclick="sendCommand('${id}','UNLOCK')">Unlock</button>
          ${isInUse ? `<button style="background:#374151; color:white;" onclick="forceCheckin('${id}')">Check-in</button>` : ''}
        </div>
      </div>
    `;
    if (isInUse) flagged.push(cardHtml(true));
    else normal.push(cardHtml(false));
  });

  flaggedDiv.innerHTML = flagged.length ? flagged.join('') : '<div class="empty">Tidak ada device dipakai.</div>';
  listDiv.innerHTML = normal.join('');
}

function renderUsers(users) {
  const div = document.getElementById('user-list');
  const ids = Object.keys(users || {});
  div.innerHTML = ids.length ? ids.map(id => {
    const u = users[id] || {};
    return `
    <div class="request-card" style="padding:10px;">
      <div style="font-weight:600;">${u.name || id} <span style="font-weight:400; color:#94a3b8;">(${id})</span></div>
      <div style="font-size:0.8rem; color:#94a3b8;">${u.role || '-'} · ${u.status || 'IDLE'}</div>
      <div style="font-size:0.8rem; color:#94a3b8;">Device: ${u.active_device ? u.active_device : '-'}</div>
    </div>
  `;
  }).join('') : '<div class="empty">Belum ada staff.</div>';
}

async function approveRequest(reqId, empId, name, devId) {

  try {

    // Update user
    await fetch(`${DATABASE_URL}/users/${empId}.json`, {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        active_device: devId,
        status: "ACTIVE",
        name: name
      })
    });

    // Update device
    await fetch(`${DATABASE_URL}/devices/${devId}/status.json`, {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        current_status:"IN_USE",
        current_user:name,
        employeeId:empId,
        last_seen:Date.now()
      })
    });

    // Hapus request dari Firebase setelah disetujui
    await fetch(`${DATABASE_URL}/requests/${reqId}.json`, {
      method: "DELETE"
    });

    showToast("✅ Login disetujui");

    fetchAll();

  } catch(e){

    showToast(e.message);

  }

}

async function rejectRequest(reqId, name) {
  try {
    // Hapus request dari Firebase setelah ditolak
    await fetch(`${DATABASE_URL}/requests/${reqId}.json`, {
      method: 'DELETE'
    });
    showToast(`❌ Ditolak: ${name}`);
    fetchAll();
  } catch (err) { showToast('Gagal: ' + err.message); }
}

function renderRequests(requests) {
  const div = document.getElementById('request-list');
  const ids = Object.keys(requests || {});
  const pending = ids.filter(id => (requests[id] || {}).status === 'pending');

  div.innerHTML = pending.length ? pending.map(reqId => {
    const r = requests[reqId];
    return `
      <div class="request-card">
        <div class="request-name">${r.name || 'Staff'}</div>
        <div class="request-meta">ID: ${r.employeeId} · Device: ${r.deviceId}</div>
        <div class="request-actions">
          <button class="btn-approve" onclick="approveRequest('${reqId}','${r.employeeId}','${r.name}','${r.deviceId}')">Setujui</button>
          <button class="btn-reject" onclick="rejectRequest('${reqId}','${r.name}')">Tolak</button>
        </div>
      </div>
    `;
  }).join('') : '<div class="empty">Tidak ada permintaan login.</div>';
}

async function fetchAll() {
  try {
    const [devRes, userRes, reqRes] = await Promise.all([
      fetch(`${DATABASE_URL}/devices.json`),
      fetch(`${DATABASE_URL}/users.json`),
      fetch(`${DATABASE_URL}/requests.json`)
    ]);
    renderRequests(await reqRes.json());
    renderDevices(await devRes.json());
    renderUsers(await userRes.json());
    document.getElementById('last-update').textContent = 'Update: ' + new Date().toLocaleTimeString();
  } catch (err) { console.error(err); }
}

fetchAll();
setInterval(fetchAll, REFRESH_MS);
</script>
</body>
</html>
