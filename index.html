<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KunciPDA — Admin Panel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        
        /* Modern Container */
        main { max-width: 800px; margin: 0 auto; }
        
        /* Header */
        header { border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 1.5rem; color: #fff; }
        .sub { font-size: 0.85rem; color: #94a3b8; }

        /* Existing Styles (Kept for Logic) */
        .section-title { font-size: 0.9rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin: 20px 0 10px; }
        .request-card { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .request-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .request-name { font-weight: 700; font-size: 1.1rem; }
        .request-meta { font-size: 0.8rem; color: #94a3b8; margin-bottom: 12px; }
        .request-actions { display: flex; gap: 10px; }
        .request-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-approve { background: #059669; color: white; }
        .btn-reject { background: #be123c; color: white; }
        
        .device-card { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .device-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .device-id { font-weight: 800; font-size: 1.1rem; color: var(--accent); }
        .badge { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .badge.available { background: #065f46; color: #a7f3d0; }
        .badge.inuse { background: #92400e; color: #fef3c7; }
        .badge.locked { background: #991b1b; color: #fee2e2; }
        
        .row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 4px; color: #cbd5e1; }
        .holder-banner { margin-top: 10px; padding: 10px; background: #0f172a; border-radius: 8px; font-size: 0.85rem; color: #fbbf24; border: 1px solid #334155; }
        .actions { display: flex; gap: 8px; margin-top: 15px; }
        .actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #475569; padding: 12px 24px; border-radius: 999px; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        .empty { color: #475569; font-style: italic; padding: 10px; }

        /* Riwayat Penggunaan */
        .history-card { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; user-select: none; }
        .history-head { display: flex; justify-content: space-between; align-items: center; }
        .history-body { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
        .history-entry { display: flex; justify-content: space-between; font-size: 0.8rem; color: #cbd5e1; border-top: 1px solid #334155; padding-top: 6px; }
        .history-entry:first-child { border-top: none; padding-top: 0; }

        /* Peta Lokasi Device */
        #map { height: 320px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 8px; z-index: 0; }
        .map-hint { font-size: 0.8rem; color: #64748b; margin-bottom: 12px; }
    </style>
</head>
<body>

<main>
    <header>
        <h1>🔐 KunciPDA Admin</h1>
        <div class="sub" id="last-update">Menghubungkan ke database...</div>
    </header>

    <div class="section-title">⏳ Menunggu Persetujuan</div>
    <div id="request-list"></div>

    <div class="section-title">Device Aktif (In Use)</div>
    <div id="flagged-list"></div>

    <div class="section-title">Semua Device</div>
    <div id="device-list"></div>

    <div class="section-title">🗺️ Peta Lokasi Device</div>
    <div id="map"></div>
    <div class="map-hint" id="map-hint"></div>

    <div class="section-title">Daftar Staff</div>
    <div id="user-list"></div>

    <div class="section-title">📜 Riwayat Penggunaan</div>
    <div id="history-list"></div>
</main>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- LOGIKA ANDA (DIPERTAHANKAN 100%) ---
const DATABASE_URL = "https://kuncipda-default-rtdb.asia-southeast1.firebasedatabase.app";
const REFRESH_MS = 5000;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function statusBadgeClass(status) {
  if (!status) return 'available';
  const s = status.toLowerCase();
  if (s.includes('use')) return 'inuse';
  if (s.includes('lock')) return 'locked';
  if (s.includes('lost')) return 'locked';
  return 'available';
}

function fmtTime(ts) {
  if (!ts || ts === 0) return '-';
  const d = new Date(Number(ts));
  if (isNaN(d.getTime()) || d.getFullYear() < 2000) return '-';
  return d.toLocaleString('id-ID');
}

async function sendCommand(deviceId, action) {
  try {
    await fetch(`${DATABASE_URL}/devices/${deviceId}/status.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: action })
    });
    showToast(`Perintah "${action}" terkirim ke ${deviceId}`);
    fetchAll();
  } catch (err) { showToast('Gagal: ' + err.message); }
}

async function forceCheckin(deviceId){

  try{

    await fetch(`${DATABASE_URL}/devices/${deviceId}/status.json`,{

      method:"PATCH",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        current_status:"AVAILABLE",

        current_user:"",

        employeeId:"",

        // Perintah jarak jauh: begitu HP menerima ini, dia otomatis kembali
        // ke layar login sendiri (mirip mekanisme LOCK/UNLOCK)
        command:"CHECKIN"

      })

    });

    const userRes=await fetch(`${DATABASE_URL}/users.json`);

    const users=await userRes.json();

    for(const empId in users){

      if(users[empId].active_device===deviceId){

        await fetch(`${DATABASE_URL}/users/${empId}.json`,{

          method:"PATCH",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({

            active_device:"",

            status:"IDLE"

          })

        });

        // Catat riwayat: device ini dikembalikan oleh staff yang bersangkutan
        await fetch(`${DATABASE_URL}/logs/${deviceId}.json`, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({
            event: "CHECKIN",
            user: `${users[empId].name || 'Staff'} (${empId})`,
            timestamp: Date.now()
          })
        });

        // TIDAK ada "break" di sini lagi - sengaja, supaya SEMUA staff yang
        // (secara data) tercatat masih pegang device ini ikut direset semua,
        // bukan cuma yang pertama ditemukan.

      }

    }

    showToast("Device berhasil dikembalikan");

    fetchAll();

  }catch(e){

    showToast(e.message);

  }

}

function renderDevices(devices) {
  const ids = Object.keys(devices || {});
  const flaggedDiv = document.getElementById('flagged-list');
  const listDiv = document.getElementById('device-list');
  const flagged = []; const normal = [];

  ids.forEach(id => {
    const d = devices[id] || {};
    const status = d.status || {};
    const isInUse = (status.current_status || '').toUpperCase() === 'IN_USE';
    const pendingCmd = status.command && status.command !== 'NONE';
    const nickname = (d.info || {}).nickname;

    const loc = d.location || {};
    const lat = parseCoord(loc.lat);
    const lng = parseCoord(loc.lng);
    const hasLocation = lat !== null && lng !== null && !(lat === 0 && lng === 0);
    const mapThumb = hasLocation ? `
      <a href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=17/${lat}/${lng}" target="_blank" rel="noopener">
        <img src="https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lng}&zoom=15&size=400x140&markers=${lat},${lng},red-pushpin"
             alt="Lokasi device" style="width:100%; border-radius:8px; margin-top:8px; display:block;">
      </a>
    ` : `<div style="font-size:0.75rem; color:#64748b; margin-top:8px;">📍 Lokasi belum tersedia</div>`;

    const cardHtml = (flaggedStyle) => `
      <div class="device-card">
        <div class="device-top">
          <div>
            <div class="device-id">${nickname ? nickname : id}</div>
            ${nickname ? `<div style="font-size:0.7rem; color:#64748b;">${id}</div>` : ''}
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="badge ${statusBadgeClass(status.current_status)}">${status.current_status || 'UNKNOWN'}</span>
            <button style="background:none; border:1px solid #334155; color:#94a3b8; border-radius:6px; padding:4px 8px; font-size:0.75rem; cursor:pointer;" onclick="setNickname('${id}')">✏️</button>
          </div>
        </div>
        <div class="row"><span>Asset</span><b>${(d.info || {}).asset_tag || '-'}</b></div>
        <div class="row"><span>Battery</span><b>${status.battery_level != null ? status.battery_level + '%' : '-'}</b></div>
        ${mapThumb}
        ${isInUse ? `<div class="holder-banner">📌 Dipakai: <b>${status.current_user || 'Unknown'}</b>${status.employeeId ? ` <span style="color:#94a3b8; font-weight:400;">(${status.employeeId})</span>` : ''}</div>` : ''}
        ${pendingCmd ? `<div style="font-size:0.7rem; color:#f59e0b; margin-top:5px;">⏳ Waiting: ${status.command}</div>` : ''}
        <div class="actions">
          <button style="background:#991b1b; color:white;" onclick="sendCommand('${id}','LOCK')">Lock</button>
          <button style="background:#065f46; color:white;" onclick="sendCommand('${id}','UNLOCK')">Unlock</button>
          ${isInUse ? `<button style="background:#374151; color:white;" onclick="forceCheckin('${id}')">Check-in</button>` : ''}
        </div>
      </div>
    `;
    if (isInUse) flagged.push(cardHtml(true));
    else normal.push(cardHtml(false));
  });

  flaggedDiv.innerHTML = flagged.length ? flagged.join('') : '<div class="empty">Tidak ada device dipakai.</div>';
  listDiv.innerHTML = normal.join('');
}

let lastDevices = {};

async function setNickname(id) {
  const current = (lastDevices[id] && lastDevices[id].info && lastDevices[id].info.nickname) || '';
  const name = prompt('Nama panggilan untuk device ini (kosongkan untuk hapus):', current);
  if (name === null) return; // dibatalkan
  try {
    await fetch(`${DATABASE_URL}/devices/${id}/info.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: name })
    });
    showToast('Nama panggilan disimpan');
    fetchAll();
  } catch (err) { showToast('Gagal simpan nama: ' + err.message); }
}

function toggleHistory(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function renderHistory(logs) {
  const div = document.getElementById('history-list');
  const deviceIds = Object.keys(logs || {});

  if (!deviceIds.length) {
    div.innerHTML = '<div class="empty">Belum ada riwayat penggunaan.</div>';
    return;
  }

  div.innerHTML = deviceIds.map(devId => {
    const entries = logs[devId] || {};
    const logIds = Object.keys(entries).sort((a, b) => (entries[b].timestamp || 0) - (entries[a].timestamp || 0));
    const bodyId = 'history-body-' + devId;

    const rows = logIds.length ? logIds.map(lid => {
      const l = entries[lid] || {};
      const t = l.timestamp ? new Date(Number(l.timestamp)).toLocaleString('id-ID') : '-';
      return `<div class="history-entry"><span>${l.event || '-'} · ${l.user || '-'}</span><b>${t}</b></div>`;
    }).join('') : '<div class="empty" style="padding:0;">Belum ada log untuk device ini.</div>';

    return `
      <div class="history-card" onclick="toggleHistory('${bodyId}')">
        <div class="history-head">
          <div class="device-id">${devId}</div>
          <span style="font-size:0.8rem; color:#94a3b8;">${logIds.length} riwayat ▾</span>
        </div>
        <div id="${bodyId}" class="history-body" style="display:none;">
          ${rows}
        </div>
      </div>
    `;
  }).join('');
}

let map;
let markersLayer;

function initMap() {
  // Default view: tengah Indonesia, di-zoom out dulu sebelum tahu lokasi device
  map = L.map('map').setView([-2.5, 118], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

// App Android menyimpan lat/lng sebagai teks dengan KOMA sebagai desimal
// (mis. "-6,914744"), bukan titik - jadi perlu dikonversi dulu sebelum di-parse.
function parseCoord(val) {
  if (val === undefined || val === null || val === '') return null;
  const num = parseFloat(String(val).replace(',', '.'));
  return isNaN(num) ? null : num;
}

function renderMap(devices) {
  if (!map) return;
  markersLayer.clearLayers();

  const ids = Object.keys(devices || {});
  const points = [];

  ids.forEach(id => {
    const dev = devices[id] || {};
    const loc = dev.location || {};
    const lat = parseCoord(loc.lat);
    const lng = parseCoord(loc.lng);

    // Lewati kalau belum ada data lokasi, atau masih 0,0 (GPS belum dapat fix pertama)
    if (lat === null || lng === null || (lat === 0 && lng === 0)) return;

    const status = (dev.status || {}).current_status || 'UNKNOWN';
    const holder = (dev.status || {}).current_user;
    const nickname = (dev.info || {}).nickname;
    const label = nickname ? `${nickname} <span style="color:#888;">(${id})</span>` : id;

    const marker = L.marker([lat, lng]).bindPopup(
      `<b>${label}</b><br>${status}${holder ? ' · ' + holder : ''}`
    );
    markersLayer.addLayer(marker);
    points.push([lat, lng]);
  });

  const hint = document.getElementById('map-hint');
  if (points.length) {
    map.fitBounds(points, { maxZoom: 16, padding: [30, 30] });
    hint.textContent = '';
  } else {
    hint.textContent = 'Belum ada device dengan lokasi valid (GPS mungkin belum aktif/belum dapat sinyal).';
  }
}

async function deleteUser(id) {
  try {
    await fetch(`${DATABASE_URL}/users/${id}.json`, { method: 'DELETE' });
    showToast(`Staff ${id} dihapus`);
    fetchAll();
  } catch (err) { showToast('Gagal hapus: ' + err.message); }
}

function renderUsers(users, devices) {
  const div = document.getElementById('user-list');
  const ids = Object.keys(users || {});
  div.innerHTML = ids.length ? ids.map(id => {
    const u = users[id] || {};
    const isIdle = (u.status || '').toUpperCase() !== 'ACTIVE';
    const devNick = u.active_device && devices && devices[u.active_device]
      ? (devices[u.active_device].info || {}).nickname
      : null;
    const deviceLabel = u.active_device ? (devNick ? `${devNick} (${u.active_device})` : u.active_device) : '-';
    return `
    <div class="request-card" style="padding:10px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
        <div>
          <div style="font-weight:600;">${u.name || id} <span style="font-weight:400; color:#94a3b8;">(${id})</span></div>
          <div style="font-size:0.8rem; color:#94a3b8;">${u.role || '-'} · ${u.status || 'IDLE'}</div>
          <div style="font-size:0.8rem; color:#94a3b8;">Device: ${deviceLabel}</div>
        </div>
        ${isIdle ? `<button style="flex:none; padding:6px 10px; background:#7f1d1d; color:white; border:none; border-radius:6px; font-size:0.75rem; cursor:pointer;" onclick="deleteUser('${id}')">Hapus</button>` : ''}
      </div>
    </div>
  `;
  }).join('') : '<div class="empty">Belum ada staff.</div>';
}

async function approveRequest(reqId, empId, name, devId) {

  try {

    // Set status "approved" dulu - INI WAJIB ADA supaya app Android (MainActivity)
    // yang sedang menunggu event ini bisa pindah ke halaman Home. Kalau langkah ini
    // dilewati, app di HP staff akan macet di spinner "Mengirim permintaan..." selamanya.
    await fetch(`${DATABASE_URL}/requests/${reqId}.json`, {
      method: "PATCH",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ status: "approved" })
    });

    // Cek dulu apakah device ini sebelumnya masih tercatat dipegang staff LAIN
    // (yang belum sempat checkout). Kalau ada, reset staff lama itu ke IDLE dulu -
    // supaya tidak ada 2 staff sekaligus tercatat ACTIVE pegang device yang sama.
    const prevStatusRes = await fetch(`${DATABASE_URL}/devices/${devId}/status.json`);
    const prevStatus = await prevStatusRes.json();
    const prevEmpId = prevStatus && prevStatus.employeeId;
    if (prevEmpId && prevEmpId !== empId) {
      await fetch(`${DATABASE_URL}/users/${prevEmpId}.json`, {
        method: "PATCH",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ active_device: "", status: "IDLE" })
      });
    }

    // Update user
    await fetch(`${DATABASE_URL}/users/${empId}.json`, {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        active_device: devId,
        status: "ACTIVE",
        name: name
      })
    });

    // Update device
    await fetch(`${DATABASE_URL}/devices/${devId}/status.json`, {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        current_status:"IN_USE",
        current_user:name,
        employeeId:empId,
        last_seen:Date.now()
      })
    });

    // Hapus request TIDAK dilakukan di sini lagi. App Android (MainActivity) sudah
    // otomatis menghapus request ini sendiri (firebaseRequest.removeValue()) begitu
    // dia berhasil memproses status "approved". Kalau dashboard ikut menghapus di sini,
    // ada resiko request hilang SEBELUM app sempat menerima event "approved" (terutama
    // kalau koneksi HP staff sedang tidak stabil) - staff jadi macet di spinner login
    // selamanya. Membiarkan app yang hapus sendiri menjamin urutan selalu benar.

    // Catat riwayat: device ini mulai dipakai staff yang bersangkutan
    await fetch(`${DATABASE_URL}/logs/${devId}.json`, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({
        event: "CHECKOUT",
        user: `${name} (${empId})`,
        timestamp: Date.now()
      })
    });

    showToast("✅ Login disetujui");

    fetchAll();

  } catch(e){

    showToast(e.message);

  }

}

async function rejectRequest(reqId, name) {
  try {
    // PATCH status "rejected" dulu supaya app di HP staff (yang sedang menunggu event
    // ini) bisa menampilkan teks "Ditolak oleh admin". Baru setelah dikasih jeda
    // beberapa detik (supaya app pasti sempat menerima event ini), request dihapus.
    await fetch(`${DATABASE_URL}/requests/${reqId}.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'rejected' })
    });
    showToast(`❌ Ditolak: ${name}`);
    fetchAll();

    setTimeout(() => {
      fetch(`${DATABASE_URL}/requests/${reqId}.json`, { method: 'DELETE' }).catch(() => {});
    }, 4000);
  } catch (err) { showToast('Gagal: ' + err.message); }
}

function renderRequests(requests) {
  const div = document.getElementById('request-list');
  const ids = Object.keys(requests || {});
  const pending = ids.filter(id => (requests[id] || {}).status === 'pending');

  div.innerHTML = pending.length ? pending.map(reqId => {
    const r = requests[reqId];
    const ts = Number(r.requested_at);
    const ageMinutes = ts ? (Date.now() - ts) / 60000 : null;
    const isStale = ageMinutes !== null && ageMinutes > 15; // lebih dari 15 menit dianggap kemungkinan basi
    const timeLabel = ts ? fmtTime(r.requested_at) : '-';

    return `
      <div class="request-card">
        <div class="request-name">${r.name || 'Staff'}</div>
        <div class="request-meta">
          ID: ${r.employeeId} · Device: ${r.deviceId}<br>
          Diminta: ${timeLabel}
          ${isStale ? ' <span style="color:#f59e0b; font-weight:600;">⚠️ Sudah lama, kemungkinan basi</span>' : ''}
        </div>
        <div class="request-actions">
          <button class="btn-approve" onclick="approveRequest('${reqId}','${r.employeeId}','${r.name}','${r.deviceId}')">Setujui</button>
          <button class="btn-reject" onclick="rejectRequest('${reqId}','${r.name}')">Tolak</button>
        </div>
      </div>
    `;
  }).join('') : '<div class="empty">Tidak ada permintaan login.</div>';
}

async function fetchAll() {
  try {
    const [devRes, userRes, reqRes, logRes] = await Promise.all([
      fetch(`${DATABASE_URL}/devices.json`),
      fetch(`${DATABASE_URL}/users.json`),
      fetch(`${DATABASE_URL}/requests.json`),
      fetch(`${DATABASE_URL}/logs.json`)
    ]);

    // Kalau Firebase menolak (mis. permission denied), jangan anggap responsnya
    // sebagai data asli - pakai objek kosong sebagai gantinya supaya tidak salah tampil.
    const safeJson = async (res) => {
      if (!res.ok) return {};
      const data = await res.json();
      return (data && typeof data === 'object') ? data : {};
    };

    const devices = await safeJson(devRes);
    lastDevices = devices || {};
    renderRequests(await safeJson(reqRes));
    renderDevices(devices);
    renderMap(devices);
    renderUsers(await safeJson(userRes), devices);
    renderHistory(await safeJson(logRes));
    document.getElementById('last-update').textContent = 'Update: ' + new Date().toLocaleTimeString();
  } catch (err) { console.error(err); }
}

initMap();
fetchAll();
setInterval(fetchAll, REFRESH_MS);
</script>
</body>
</html>
