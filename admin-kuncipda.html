<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KunciPDA — Admin Monitoring</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #14110f;
    color: #f2ece4;
  }
  header {
    background: linear-gradient(90deg, #a9651f, #7c4413);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 {
    margin: 0;
    font-size: 1.25rem;
    letter-spacing: 0.2px;
  }
  header .meta {
    font-size: 0.8rem;
    opacity: 0.85;
  }
  #layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 64px);
  }
  @media (min-width: 900px) {
    #layout { flex-direction: row; }
  }
  #map {
    flex: 1;
    min-height: 320px;
    background: #1c1916;
  }
  #sidebar {
    width: 100%;
    max-width: 100%;
    overflow-y: auto;
    background: #1c1815;
    border-top: 1px solid #3a322a;
    padding: 12px;
  }
  @media (min-width: 900px) {
    #sidebar {
      width: 340px;
      border-top: none;
      border-left: 1px solid #3a322a;
    }
  }
  .device-card {
    background: #23201b;
    border: 1px solid #3a322a;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .device-card:hover {
    border-color: #d98e3f;
  }
  .device-card.active {
    border-color: #e0a64f;
    background: #2a2319;
  }
  .device-card .name {
    font-weight: 600;
    font-size: 0.98rem;
    margin-bottom: 4px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #c9bfb2;
    margin-top: 2px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .badge.available { background: #245c3a; color: #b9f3cf; }
  .badge.inuse { background: #5c4a24; color: #f3dfb9; }
  .badge.offline { background: #5c2424; color: #f3b9b9; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  #empty-msg {
    color: #9a8f80;
    font-size: 0.85rem;
    padding: 12px;
    line-height: 1.5;
  }
  .refresh-info {
    font-size: 0.72rem;
    color: #8a7f70;
    margin-top: 10px;
    text-align: center;
  }
  .leaflet-popup-content { font-size: 0.85rem; line-height: 1.4; }
</style>
</head>
<body>

<header>
  <h1>📍 KunciPDA — Monitoring Lokasi Device</h1>
  <div class="meta" id="last-update">Memuat data...</div>
</header>

<div id="layout">
  <div id="map"></div>
  <div id="sidebar">
    <div id="device-list"></div>
    <div id="empty-msg" style="display:none;">
      Tidak ada device ditemukan, atau akses dibaca ditolak oleh Firebase Rules.
      Pastikan path <b>/devices</b> bisa dibaca publik, atau tambahkan autentikasi.
    </div>
    <div class="refresh-info">Auto-refresh setiap 5 detik</div>
  </div>
</div>

<script>
// ====== KONFIGURASI ======
const DATABASE_URL = "https://kuncipda-default-rtdb.asia-southeast1.firebasedatabase.app";
const REFRESH_MS = 5000;
// ==========================

const map = L.map('map').setView([-2.5, 118], 5); // default: tengah Indonesia
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const markers = {};
let activeDeviceId = null;
let firstLoad = true;

function statusBadgeClass(status) {
  if (!status) return 'offline';
  const s = status.toLowerCase();
  if (s.includes('available')) return 'available';
  if (s.includes('use') || s.includes('progress')) return 'inuse';
  return 'offline';
}

function fmtTime(ts) {
  if (!ts || ts === 0) return '-';
  try {
    const d = new Date(Number(ts));
    if (isNaN(d.getTime()) || d.getFullYear() < 2000) return '-';
    return d.toLocaleString('id-ID');
  } catch(e) { return '-'; }
}

function renderSidebar(devices) {
  const list = document.getElementById('device-list');
  const emptyMsg = document.getElementById('empty-msg');
  const ids = Object.keys(devices || {});

  if (ids.length === 0) {
    list.innerHTML = '';
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';

  list.innerHTML = ids.map(id => {
    const d = devices[id] || {};
    const info = d.info || {};
    const status = d.status || {};
    const loc = d.location || {};
    const cls = statusBadgeClass(status.current_status);
    const isActive = id === activeDeviceId ? 'active' : '';
    return `
      <div class="device-card ${isActive}" data-id="${id}" onclick="focusDevice('${id}')">
        <div class="name">${id} <span class="badge ${cls}">${status.current_status || 'UNKNOWN'}</span></div>
        <div class="row"><span>Asset</span><span>${info.asset_tag || '-'}</span></div>
        <div class="row"><span>Model</span><span>${info.model || '-'}</span></div>
        <div class="row"><span>Battery</span><span>${status.battery_level != null ? status.battery_level + '%' : '-'}</span></div>
        <div class="row"><span>Lat / Lng</span><span>${loc.lat != null ? Number(loc.lat).toFixed(6) : '-'}, ${loc.lng != null ? Number(loc.lng).toFixed(6) : '-'}</span></div>
        <div class="row"><span>User</span><span>${status.current_user || '-'}</span></div>
      </div>
    `;
  }).join('');
}

function renderMarkers(devices) {
  const ids = Object.keys(devices || {});
  const seen = new Set();

  ids.forEach(id => {
    const d = devices[id] || {};
    const loc = d.location || {};
    const lat = parseFloat(loc.lat);
    const lng = parseFloat(loc.lng);
    if (!isFinite(lat) || !isFinite(lng) || (lat === 0 && lng === 0)) return; // belum ada fix GPS

    seen.add(id);
    const info = d.info || {};
    const status = d.status || {};
    const popupHtml = `
      <b>${id}</b><br>
      Asset: ${info.asset_tag || '-'}<br>
      Status: ${status.current_status || '-'}<br>
      Battery: ${status.battery_level != null ? status.battery_level + '%' : '-'}<br>
      Update: ${fmtTime(loc.updated_at)}
    `;

    if (markers[id]) {
      markers[id].setLatLng([lat, lng]);
      markers[id].setPopupContent(popupHtml);
    } else {
      markers[id] = L.marker([lat, lng]).addTo(map).bindPopup(popupHtml);
    }
  });

  // hapus marker device yang sudah tidak ada / tidak punya lokasi valid
  Object.keys(markers).forEach(id => {
    if (!seen.has(id)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  });

  if (firstLoad && seen.size > 0) {
    const group = L.featureGroup(Object.values(markers));
    map.fitBounds(group.getBounds().pad(0.3));
    firstLoad = false;
  }
}

window.focusDevice = function(id) {
  activeDeviceId = id;
  if (markers[id]) {
    map.setView(markers[id].getLatLng(), 16);
    markers[id].openPopup();
  }
};

async function fetchDevices() {
  try {
    const res = await fetch(`${DATABASE_URL}/devices.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('last-update').textContent =
      'Update terakhir: ' + new Date().toLocaleTimeString('id-ID');
    renderSidebar(data || {});
    renderMarkers(data || {});
  } catch (err) {
    document.getElementById('last-update').textContent = 'Gagal memuat data: ' + err.message;
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent =
      'Gagal mengambil data dari Firebase. Cek koneksi internet atau Firebase Rules (akses baca mungkin ditolak).';
  }
}

fetchDevices();
setInterval(fetchDevices, REFRESH_MS);
</script>

</body>
</html>
